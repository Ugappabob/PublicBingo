<!DOCTYPE html>
<html>
<head>
    <title>Admin Status Check</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script>
        // Paste the Web client config from Firebase Console → Project settings (do not commit real values).
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID",
            measurementId: "YOUR_MEASUREMENT_ID",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com"
        };

        const missing =
            !firebaseConfig.apiKey ||
            firebaseConfig.apiKey === "YOUR_API_KEY" ||
            firebaseConfig.projectId === "YOUR_PROJECT_ID";

        if (missing) {
            document.addEventListener("DOMContentLoaded", function () {
                document.getElementById("status").textContent =
                    "Edit public/admin-check.html and replace YOUR_* placeholders with your Firebase Web config (from Console). Do not commit real values.";
            });
        } else {
            firebase.initializeApp(firebaseConfig);
        }

        function checkAdminStatus() {
            if (missing) return;
            const user = firebase.auth().currentUser;
            if (user) {
                user.getIdTokenResult()
                    .then((idTokenResult) => {
                        console.log('Token claims:', idTokenResult.claims);
                        document.getElementById('status').textContent = 
                            `Admin status: ${idTokenResult.claims.admin ? 'Yes' : 'No'}`;
                    })
                    .catch((error) => {
                        console.error('Error getting token:', error);
                        document.getElementById('status').textContent = 
                            'Error checking admin status';
                    });
            } else {
                document.getElementById('status').textContent = 
                    'Not signed in';
            }
        }

        // Check status when page loads
        if (!missing) {
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    checkAdminStatus();
                } else {
                    document.getElementById('status').textContent =
                        'Not signed in';
                }
            });
        }
    </script>
</head>
<body>
    <h1>Admin Status Check</h1>
    <div id="status">Checking...</div>
    <button onclick="checkAdminStatus()">Check Again</button>
</body>
</html>
